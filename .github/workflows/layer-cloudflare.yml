name: "L2: Cloudflare"

on:
  pull_request:
    branches: [main]
    paths:
      - "layers/L2-cloudflare/**"
      - "modules/**"
  push:
    branches: [main]
    paths:
      - "layers/L2-cloudflare/**"
      - "modules/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/_terraform-plan.yml
    with:
      layer_path: layers/L2-cloudflare
    secrets: inherit

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      layer_path: layers/L2-cloudflare
      environment: cloudflare
    secrets: inherit
