name: Terraform Plan – Env-Aware (Reusable)

on:
  workflow_call:
    inputs:
      layer_path:
        description: "Path to the Terraform layer directory"
        required: true
        type: string
      env_name:
        description: "Environment name (e.g. stgx, prdx)"
        required: true
        type: string
      backend_container:
        description: "Azure Storage container name for Terraform state"
        required: true
        type: string
      terraform_version:
        description: "Terraform version to use (overrides .terraform-version)"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: "Plan (${{ inputs.env_name }})"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.layer_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Terraform version
        id: tf-version
        run: |
          if [ -n "${{ inputs.terraform_version }}" ]; then
            echo "version=${{ inputs.terraform_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(cat ${GITHUB_WORKSPACE}/.terraform-version)" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tf-version.outputs.version }}

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        id: init
        run: terraform init -backend-config="container_name=${{ inputs.backend_container }}"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=envs/${{ inputs.env_name }}.tfvars -no-color -out=tfplan
        continue-on-error: true

      - name: Upload Plan Artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.env_name }}-${{ github.event.pull_request.number }}-${{ hashFiles(format('{0}/**', inputs.layer_path)) }}
          path: ${{ inputs.layer_path }}/tfplan
          retention-days: 5

      - name: Post Plan Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          VALIDATE_OUTPUT: ${{ steps.validate.outputs.stdout }}
          LAYER_PATH: ${{ inputs.layer_path }}
          ENV_NAME: ${{ inputs.env_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const planOutput = process.env.PLAN_OUTPUT || '';
            const planOutcome = process.env.PLAN_OUTCOME;
            const validateOutput = process.env.VALIDATE_OUTPUT || '';
            const layerPath = process.env.LAYER_PATH;
            const envName = process.env.ENV_NAME;

            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... (truncated)'
              : planOutput;

            const icon = planOutcome === 'success' ? ':white_check_mark:' : ':x:';
            const body = `### ${icon} Terraform Plan — \`${layerPath}\` / \`${envName}\`

            #### Validation
            \`\`\`
            ${validateOutput}
            \`\`\`

            #### Plan
            \`\`\`hcl
            ${truncated}
            \`\`\`

            *Pushed by @${context.actor}, Action: \`${context.eventName}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `Terraform Plan — \`${layerPath}\` / \`${envName}\``;
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1
