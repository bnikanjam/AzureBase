name: "L0: Bootstrap"

on:
  pull_request:
    branches: [main]
    paths:
      - "layers/L0-bootstrap/**"
  push:
    branches: [main]
    paths:
      - "layers/L0-bootstrap/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/_terraform-plan.yml
    with:
      layer_path: layers/L0-bootstrap
    secrets: inherit

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_terraform-apply.yml
    with:
      layer_path: layers/L0-bootstrap
      environment: bootstrap
    secrets: inherit
